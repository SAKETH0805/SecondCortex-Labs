<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Cortex — IDE Prototype</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="codedata.js"></script>
    <style>
        :root {
            --bg: #181818;
            --bg2: #252526;
            --bg3: #1e1e1e;
            --bg4: #2d2d2d;
            --bdr: #3e3e42;
            --tx: #ccc;
            --txb: #e0e0e0;
            --txm: #6e6e6e;
            --txw: #fff;
            --bl: #569cd6;
            --gr: #4EC9B0;
            --or: #ce9178;
            --yl: #dcdcaa;
            --lb: #9cdcfe;
            --cm: #6A9955;
            --sc: #7928CA;
            --pk: #FF0080;
            --scg: linear-gradient(135deg, #FF0080, #7928CA);
            --glow: rgba(121, 40, 202, .35);
            --diff: rgba(78, 201, 176, .12)
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #111;
            color: var(--tx);
            overflow: hidden;
            height: 100vh
        }

        @keyframes slideUp {
            from {
                transform: translateY(12px);
                opacity: 0
            }

            to {
                transform: translateY(0);
                opacity: 1
            }
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 var(--glow)
            }

            70% {
                box-shadow: 0 0 0 8px transparent
            }

            100% {
                box-shadow: 0 0 0 0 transparent
            }
        }

        @keyframes glow {

            0%,
            100% {
                opacity: .5
            }

            50% {
                opacity: 1
            }
        }

        @keyframes pop {
            from {
                transform: scale(0)
            }

            to {
                transform: scale(1)
            }
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh
        }

        .title-bar {
            height: 32px;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--txm);
            border-bottom: 1px solid var(--bdr);
            position: relative
        }

        .dots {
            position: absolute;
            left: 14px;
            display: flex;
            gap: 8px
        }

        .d {
            width: 12px;
            height: 12px;
            border-radius: 50%
        }

        .dr {
            background: #ff5f56
        }

        .dy {
            background: #ffbd2e
        }

        .dg {
            background: #27c93f
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        /* Activity */
        .act {
            width: 48px;
            background: var(--bg2);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px 0;
            gap: 2px;
            z-index: 5
        }

        .ai {
            width: 100%;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--txm);
            cursor: pointer;
            position: relative;
            transition: color .2s
        }

        .ai:hover {
            color: var(--tx)
        }

        .ai.on {
            color: var(--txw)
        }

        .ai.on::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 2px;
            background: var(--txw)
        }

        .ai .bdg {
            position: absolute;
            top: 6px;
            right: 8px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--pk);
            animation: pulse 2s infinite;
            display: none
        }

        /* Explorer */
        .exp {
            width: 240px;
            background: var(--bg3);
            border-right: 1px solid var(--bdr);
            display: flex;
            flex-direction: column;
            font-size: 13px
        }

        .exp.hide {
            display: none
        }

        .exp-t {
            height: 35px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--txm)
        }

        .ft {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0
        }

        .fi {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 13px;
            color: var(--tx);
            transition: background .15s;
            white-space: nowrap
        }

        .fi:hover {
            background: rgba(255, 255, 255, .04)
        }

        .fi.on {
            background: rgba(255, 255, 255, .08);
            color: var(--txw)
        }

        .ic {
            width: 16px;
            height: 16px;
            flex-shrink: 0
        }

        /* Editor */
        .ed {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg3)
        }

        .tabs {
            height: 36px;
            background: var(--bg2);
            display: flex;
            border-bottom: 1px solid var(--bdr);
            overflow-x: auto
        }

        .tb {
            height: 100%;
            padding: 0 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            cursor: pointer;
            border-right: 1px solid var(--bdr);
            white-space: nowrap;
            flex-shrink: 0
        }

        .tb.on {
            background: var(--bg3);
            color: var(--txw);
            border-top: 2px solid var(--sc)
        }

        .tb.off {
            background: var(--bg2);
            color: var(--txm)
        }

        .tb .x {
            width: 14px;
            height: 14px;
            opacity: .4;
            margin-left: 4px
        }

        .tb .x:hover {
            opacity: 1
        }

        .ebody {
            flex: 1;
            display: flex;
            overflow: auto
        }

        .ln {
            width: 55px;
            min-width: 55px;
            text-align: right;
            padding: 12px 12px 12px 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #4e4e4e;
            user-select: none
        }

        .cd {
            flex: 1;
            padding: 12px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre;
            overflow-x: auto
        }

        /* SC Sidebar */
        .sc-sb {
            width: 320px;
            background: #13111a;
            border-right: 1px solid rgba(121, 40, 202, .2);
            display: none;
            flex-direction: column;
            font-size: 13px;
            z-index: 5
        }

        .sc-sb.open {
            display: flex
        }

        .sc-h {
            height: 42px;
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            flex-shrink: 0
        }

        .sc-ht {
            font-size: 13px;
            font-weight: 600;
            background: var(--scg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        .sc-pill {
            margin-left: auto;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 10px;
            background: rgba(78, 201, 176, .1);
            color: var(--gr);
            border: 1px solid rgba(78, 201, 176, .2);
            display: flex;
            align-items: center;
            gap: 4px
        }

        .sc-pill .pd {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gr)
        }

        .snap-row {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
            flex-shrink: 0
        }

        .snap-btn {
            width: 100%;
            background: var(--scg);
            color: #fff;
            border: none;
            padding: 9px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 10px var(--glow);
            transition: transform .15s
        }

        .snap-btn:hover {
            transform: translateY(-1px)
        }

        .snap-btn:disabled {
            opacity: .5;
            cursor: default;
            transform: none
        }

        .ci-list {
            flex: 1;
            overflow-y: auto;
            padding: 0
        }

        .ci {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            transition: background .15s
        }

        .ci:hover {
            background: rgba(255, 255, 255, .03)
        }

        .ci-g {
            width: 32px;
            min-width: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative
        }

        .ci-gt {
            width: 2px;
            height: 50%
        }

        .ci-gb {
            width: 2px;
            height: 50%
        }

        .gl {
            background: #2563eb
        }

        .ci-d {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2
        }

        .cd-b {
            background: #2563eb
        }

        .cd-g {
            background: var(--gr)
        }

        .cd-o {
            background: #d97706
        }

        .cd-p {
            background: var(--sc)
        }

        .ci-i {
            flex: 1;
            padding: 8px 10px 8px 4px
        }

        .ci-m {
            font-size: 12px;
            color: var(--txb);
            line-height: 1.35;
            margin-bottom: 3px
        }

        .ci-mt {
            font-size: 10px;
            color: var(--txm);
            font-family: 'JetBrains Mono', monospace
        }

        .ci-tg {
            margin-top: 4px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap
        }

        .tg {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 3px;
            font-weight: 600
        }

        .tg-b {
            background: rgba(37, 99, 235, .12);
            color: #60a5fa;
            border: 1px solid rgba(37, 99, 235, .2)
        }

        .tg-h {
            background: rgba(121, 40, 202, .12);
            color: #b57aed;
            border: 1px solid rgba(121, 40, 202, .2)
        }

        .tg-s {
            background: rgba(121, 40, 202, .1);
            color: #b57aed;
            border: 1px solid rgba(121, 40, 202, .2);
            display: none
        }

        .tg-s.show {
            display: inline-block;
            animation: pop .3s ease
        }

        /* Chat */
        .ch-sec {
            border-top: 1px solid rgba(255, 255, 255, .06);
            display: flex;
            flex-direction: column;
            max-height: 40%
        }

        .ch-hd {
            padding: 10px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--txm);
            display: flex;
            align-items: center;
            gap: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            flex-shrink: 0
        }

        .ch-ms {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .bb {
            max-width: 90%;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 12px;
            line-height: 1.45;
            animation: slideUp .3s ease
        }

        .bb.u {
            align-self: flex-end;
            background: var(--sc);
            color: #fff;
            border-bottom-right-radius: 3px
        }

        .bb.b {
            align-self: flex-start;
            background: rgba(255, 255, 255, .06);
            color: var(--txb);
            border-bottom-left-radius: 3px;
            border: 1px solid rgba(255, 255, 255, .06)
        }

        .cr {
            display: block;
            margin-top: 6px;
            padding: 6px;
            border-radius: 5px;
            background: rgba(121, 40, 202, .08);
            border: 1px solid rgba(121, 40, 202, .15);
            font-size: 11px
        }

        .rb {
            width: calc(100% - 24px);
            margin: 8px 12px;
            background: var(--scg);
            color: #fff;
            border: none;
            padding: 9px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 10px var(--glow)
        }

        .rb.show {
            display: flex;
            animation: slideUp .35s ease
        }

        .ch-ir {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            border-top: 1px solid rgba(255, 255, 255, .04);
            flex-shrink: 0
        }

        .ch-in {
            flex: 1;
            background: var(--bg4);
            border: 1px solid var(--bdr);
            border-radius: 6px;
            padding: 7px 10px;
            color: var(--txb);
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            outline: none
        }

        .ch-in:focus {
            border-color: var(--sc)
        }

        .ch-sd {
            background: var(--scg);
            border: none;
            border-radius: 6px;
            padding: 0 10px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: rgba(19, 17, 26, .95);
            border: 1px solid rgba(121, 40, 202, .4);
            border-radius: 10px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .6);
            z-index: 100;
            opacity: 0;
            transition: transform .4s ease, opacity .4s ease
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0)
        }

        .toast-ic {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--scg);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .toast-tx {
            font-size: 12px
        }

        .toast-tx strong {
            background: var(--scg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent
        }

        /* Status */
        .sb {
            height: 24px;
            background: #007acc;
            display: flex;
            align-items: center;
            padding: 0 12px;
            font-size: 11px;
            color: #fff;
            gap: 16px;
            flex-shrink: 0
        }

        .sbr {
            margin-left: auto;
            display: flex;
            gap: 16px
        }

        /* Search */
        .srch {
            width: 320px;
            background: var(--bg3);
            border-right: 1px solid var(--bdr);
            display: none;
            flex-direction: column;
            font-size: 13px
        }

        .srch.open {
            display: flex;
        }

        .srch-t {
            height: 35px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--txm);
        }

        .srch-in {
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-bottom: 1px solid var(--bdr);
        }

        .srch-inp {
            background: var(--bg4);
            border: 1px solid var(--bdr);
            color: var(--txb);
            padding: 4px 6px;
            font-size: 12px;
            border-radius: 2px;
            outline: none;
        }

        .srch-res {
            padding: 8px 16px;
            font-size: 11px;
            color: var(--txm);
        }

        .srch-list {
            flex: 1;
            overflow-y: auto;
        }

        .sr-fi {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 16px;
            color: var(--txb);
            font-weight: 600;
            background: rgba(255, 255, 255, .02);
            font-size: 12px;
        }

        .sr-ln {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            padding: 4px 16px 4px 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            cursor: pointer;
            color: var(--txm);
        }

        .sr-ln:hover {
            background: rgba(255, 255, 255, .04);
            color: var(--tx);
        }

        .sr-hl {
            background: rgba(220, 220, 170, .3);
            color: var(--txb);
        }

        /* Extensions */
        .ext {
            width: 280px;
            background: var(--bg3);
            border-right: 1px solid var(--bdr);
            display: none;
            flex-direction: column;
            font-size: 13px
        }

        .ext.open {
            display: flex
        }

        .ext-t {
            height: 35px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--txm)
        }

        .ext-in {
            padding: 8px 12px;
            border-bottom: 1px solid var(--bdr)
        }

        .ext-inp {
            width: 100%;
            background: var(--bg4);
            border: 1px solid var(--bdr);
            color: var(--txb);
            padding: 5px 8px;
            font-size: 12px;
            border-radius: 3px;
            outline: none
        }

        .ext-list {
            flex: 1;
            overflow-y: auto
        }

        .ext-item {
            display: flex;
            gap: 10px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background .15s;
            border-bottom: 1px solid rgba(255, 255, 255, .03)
        }

        .ext-item:hover {
            background: rgba(255, 255, 255, .04)
        }

        .ext-item.on {
            background: rgba(121, 40, 202, .08);
            border-left: 2px solid var(--sc)
        }

        .ext-icon {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 18px
        }

        .ext-info {
            flex: 1;
            min-width: 0
        }

        .ext-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--txb);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .ext-pub {
            font-size: 11px;
            color: var(--txm);
            margin-top: 1px
        }

        .ext-desc {
            font-size: 11px;
            color: var(--tx);
            margin-top: 3px;
            line-height: 1.35;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .ext-meta {
            display: flex;
            gap: 8px;
            margin-top: 4px;
            font-size: 10px;
            color: var(--txm)
        }

        .ext-star {
            color: #e3b341
        }

        /* Extension detail in editor */
        .ext-detail {
            padding: 28px 32px;
            max-width: 700px;
            animation: slideUp .3s ease
        }

        .ext-detail-hd {
            display: flex;
            gap: 16px;
            align-items: flex-start;
            margin-bottom: 20px
        }

        .ext-detail-icon {
            width: 64px;
            height: 64px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0
        }

        .ext-detail-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--txw)
        }

        .ext-detail-pub {
            font-size: 12px;
            color: var(--txm);
            margin-top: 2px
        }

        .ext-detail-stats {
            display: flex;
            gap: 14px;
            margin-top: 6px;
            font-size: 11px;
            color: var(--txm)
        }

        .ext-detail-stats span {
            display: flex;
            align-items: center;
            gap: 3px
        }

        .ext-install-btn {
            margin-top: 10px;
            background: var(--scg);
            color: #fff;
            border: none;
            padding: 7px 20px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            font-family: 'Inter', sans-serif
        }

        .ext-detail-body {
            margin-top: 20px;
            border-top: 1px solid var(--bdr);
            padding-top: 20px
        }

        .ext-detail-body h3 {
            font-size: 16px;
            color: var(--txw);
            margin-bottom: 10px;
            font-weight: 600
        }

        .ext-detail-body p {
            font-size: 13px;
            line-height: 1.65;
            color: var(--tx);
            margin-bottom: 12px
        }

        .ext-detail-body ul {
            padding-left: 20px;
            margin-bottom: 12px
        }

        .ext-detail-body li {
            font-size: 13px;
            line-height: 1.65;
            color: var(--tx);
            margin-bottom: 4px
        }

        .ext-detail-body code {
            background: var(--bg4);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--gr)
        }

        .ext-badge {
            display: inline-block;
            font-size: 9px;
            padding: 2px 6px;
            border-radius: 3px;
            font-weight: 600
        }
    </style>
</head>

<body>
    <div class="app">
        <div class="title-bar">
            <div class="dots">
                <div class="d dr"></div>
                <div class="d dy"></div>
                <div class="d dg"></div>
            </div>
            PaymentAPI &mdash; VS Code
        </div>
        <div class="main">
            <div class="act">
                <div class="ai on" id="aF" onclick="showExp()"><i data-lucide="files"
                        style="width:22px;height:22px"></i></div>
                <div class="ai" id="aSrch" onclick="showSrch()"><i data-lucide="search"
                        style="width:22px;height:22px"></i></div>

        /* Syntax highlight a plain line */

            if (!line) return '&nbsp;';

            // Comments
            s = s.replace(/(\/\/.*$)/gm, '<span style="color:var(--cm);font-style:italic">$1</span>');
            s = s.replace(/(\/\*\*?)/g, '<span style="color:var(--cm);font-style:italic">$1</span>');

            // Strings
            s = s.replace(/(&#39;[^&#]*?&#39;|'[^']*?')/g, '<span style="color:var(--or)">$1</span>');
            // Keywords

            for (var k = 0; k < kws.length; k++) {
                var re = new RegExp('\\b(' + kws[k] + ')\\b', 'g');

            }
            // Types (capitalized words)
            s = s.replace(/\b([A-Z][a-zA-Z0-9]+)\b/g, '<span style="color:var(--gr)">$1</span>');

            return s;

            setTimeout(function () {
                var ms = document.getElementById("chM"); ms.removeChild(ms.lastChild);
                addB('<strong>&#9989; Context Resurrected!</strong><br><br>Generated <strong>handleWebhook()</strong> from 10 saved contexts:<div class="cr">&#8226; Webhook signature verification<br>&#8226; payment_intent.succeeded handler<br>&#8226; payment_intent.payment_failed handler<br>&#8226; NotificationService email alerts<br>&#8226; All 4 TODOs resolved</div><br>Check payment.controller.ts!', "b");
                // Add webhook code to end of payment.controller.ts
                var f = FILES["payment.controller.ts"];
                f.pop(); // remove closing }
                f.pop(); f.pop(); f.pop(); f.pop(); f.pop(); // remove TODOs
                f.push('  // POST /api/webhooks/stripe');
                f.push('  public async handleWebhook(req: Request, res: Response): Promise<Response> {');
                f.push('    const sig = req.headers[\'stripe-signature\'] as string;');
                f.push('    let event: Stripe.Event;');
                f.push('');
                f.push('    try {');
                f.push('      event = this.stripeService.verifyWebhookSignature(');
                f.push('        req.body, sig, process.env.STRIPE_WEBHOOK_SECRET!');
                f.push('      );');
                f.push('    } catch (err) {');
                f.push('      this.logger.error(\'Webhook signature failed\', err);');
                f.push('      return res.status(400).json({ error: \'Invalid signature\' });');
                f.push('    }');
                f.push('');
                f.push('    switch (event.type) {');
                f.push('      case \'payment_intent.succeeded\': {');
                f.push('        const pi = event.data.object as Stripe.PaymentIntent;');
                f.push('        await PaymentModel.updateStatus(pi.id, \'succeeded\');');
                f.push('        await this.notificationService.sendPaymentConfirmation({');
                f.push('          customerId: pi.metadata.customerId,');
                f.push('          amount: pi.amount / 100,');
                f.push('          currency: pi.currency,');
                f.push('          paymentId: pi.id,');
                f.push('          status: \'succeeded\',');
                f.push('        });');
                f.push('        this.logger.info(\'Payment succeeded\', { id: pi.id });');
                f.push('        break;');
                f.push('      }');
                f.push('      case \'payment_intent.payment_failed\': {');
                f.push('        const fp = event.data.object as Stripe.PaymentIntent;');
                f.push('        await PaymentModel.updateStatus(fp.id, \'failed\');');
                f.push('        await this.notificationService.sendPaymentFailure({');
                f.push('          customerId: fp.metadata.customerId,');
                f.push('          amount: fp.amount / 100,');
                f.push('          currency: fp.currency,');
                f.push('          paymentId: fp.id,');
                f.push('          status: \'failed\',');
                f.push('        });');
                f.push('        this.logger.warn(\'Payment failed\', { id: fp.id });');
                f.push('        break;');
                f.push('      }');
                f.push('      default:');
                f.push('        this.logger.info(\'Unhandled event\', { type: event.type });');
                f.push('    }');
                f.push('');
                f.push('    return res.status(200).json({ received: true });');
                f.push('  }');
                f.push('}');
                showFile("payment.controller.ts");
                document.getElementById("scB").style.display = "none";
            }, 1500);
        }
